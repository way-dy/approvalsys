    <style>
        body { font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; background-color: #F3F4F6; margin: 0; }

        @media print {

            #modal-detail > div:not([data-close-modal]) { position: static !important; width: 100% !important; max-width: 100% !important; height: auto !important; max-height: none !important; overflow: visible !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; border: none !important; }

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, doc, getDoc, getDocs, getDocsFromServer, setDoc, updateDoc, query, where, orderBy, runTransaction, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // =========================================================================
        // [중요] 배포한 Google Apps Script 웹 앱 URL
        // =========================================================================
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwI1IWnXCGqCDdgX-DR1e-HlXfIzysEQqHnVT5tpkVWLPMxrHikktswVc1S_GgnZXc/exec"; 
        const EMAIL_API_URL = "https://script.google.com/macros/s/AKfycbzNAETA0XP7rE7AEvdwm8BriRQiI07ymw1cLyrt7wAjre2t5166VgF2NH_rQ4x6-H_Y1Q/exec"; 

        // Firebase 설정
        const firebaseConfig = {
          apiKey: "AIzaSyAI_xl2HGC33VUA2synrNa23q448-pe0qQ",
          authDomain: "approval-8ef73.firebaseapp.com",
          projectId: "approval-8ef73",
          storageBucket: "approval-8ef73.firebasestorage.app",
          messagingSenderId: "32568902630",
          appId: "1:32568902630:web:176466a05952ea44cccc27"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let userList = [];
        let repairMap = {};
        let draftCache = {};
        let currentAttachments = []; 

        let currentPage = 1;          
        const itemsPerPage = 10;      
        let allFetchedData = [];      
        let filteredDisplayData = []; 

        let pendingDocId = null;
        let pendingAction = null;

        // ── 대외비 재인증 세션 관리 ──
        let confidentialAuthTime = null;                  // 마지막 재인증 시각
        const CONFIDENTIAL_SESSION_MS = 30 * 60 * 1000;  // 30분 세션 유효

        // ── 전체 기간 검색 상태 ──
        let isGlobalSearchMode = false;
        let globalSearchKeyword = "";
        let globalSearchResults = [];
        let globalSearchPage = 1;
        const GLOBAL_PAGE_SIZE = 50;

        // ── Optimistic Update 보호: 최근 결재 처리한 문서 ID ──
        let recentlyUpdatedDocIds = new Set();

        // =========================================================================
        // [최적화 핵심] 멀티 레이어 캐시 시스템
        // =========================================================================
        const CACHE_KEYS = {
            META: 'dy_meta_cache_v2',
            DRAFTS: 'dy_drafts_cache_v2',
            USER: 'dy_user_cache_v2',       // 유저 정보 캐시 추가
            LAST_TAB: 'dy_last_tab_v2'      // 마지막 탭 기억
        };
        const CACHE_EXPIRY_META = 1000 * 60 * 60 * 2;   // 메타: 2시간
        const CACHE_EXPIRY_DRAFTS = 1000 * 60 * 30;     // 기안: 30분 (15분→30분, optimistic update로 정합성 보장)
        const CACHE_EXPIRY_USER = 1000 * 60 * 60 * 24;  // 유저: 24시간
        const BG_UPDATE_THRESHOLD = 1000 * 60 * 3;      // 캐시 나이 3분 이상일 때만 백그라운드 갱신

        // =========================================================================
        // 캐시 도우미 함수
        // =========================================================================
        function saveToCache(key, data) {
            try {
                localStorage.setItem(key, JSON.stringify({ timestamp: Date.now(), data: data }));
            } catch (e) {
                console.warn('Cache save failed:', e);
                // 용량 초과 시 오래된 캐시 정리
                try {
                    localStorage.removeItem(CACHE_KEYS.DRAFTS);
                    localStorage.setItem(key, JSON.stringify({ timestamp: Date.now(), data: data }));
                } catch (e2) { /* 무시 */ }
            }
        }

        function getFromCache(key, maxAge) {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return null;
                const payload = JSON.parse(raw);
                if (maxAge && (Date.now() - payload.timestamp > maxAge)) {
                    localStorage.removeItem(key);
                    return null;
                }
                return payload.data;
            } catch (e) {
                return null;
            }
        }

        // 캐시가 존재하고 얼마나 됐는지 반환 (ms). 없으면 Infinity
        function getCacheAge(key) {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return Infinity;
                return Date.now() - JSON.parse(raw).timestamp;
            } catch (e) { return Infinity; }
        }

        // =========================================================================
        // [최적화 핵심] 스켈레톤 UI 함수
        // =========================================================================
        function showSkeletonUI() {
            const container = document.getElementById('draft-list-container');
            if (!container) return;
            let html = '';
            for (let i = 0; i < 5; i++) {
                html += `
                <div class="skeleton-card">
                    <div class="flex items-center gap-2 mb-3">
                        <div class="skeleton" style="width:50px;height:20px;"></div>
                        <div class="skeleton" style="width:120px;height:14px;"></div>
                    </div>
                    <div class="skeleton skeleton-line" style="width:${70 + Math.random()*25}%;height:20px;"></div>
                    <div class="flex justify-between mt-3 pt-2" style="border-top:1px dashed #f3f4f6">
                        <div class="skeleton" style="width:60px;height:14px;"></div>
                        <div class="skeleton" style="width:50px;height:14px;"></div>
                    </div>
                </div>`;
            }
            container.innerHTML = html;
        }

        // =========================================================================
        // [최적화 핵심] 초고속 초기화 - 캐시 우선 병렬 로딩
        // =========================================================================
        window.addEventListener('DOMContentLoaded', () => {
            initApp();
        });

        function initApp() {
            // [최적화] 캐시된 유저 정보로 즉시 앱 화면 표시 시도
            const cachedUser = getFromCache(CACHE_KEYS.USER, CACHE_EXPIRY_USER);
            if (cachedUser) {
                // 캐시된 유저로 즉시 UI 렌더링 (Firebase auth 완료 전)
                applyUserAndShowApp(cachedUser, true);
            }

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    // [최적화] 메타 + 기안 데이터를 동시에 로드
                    const hasCachedUI = !!cachedUser;
                    
                    if (!hasCachedUI) {
                        // 캐시 없을 때만 스켈레톤 표시
                        toggleView('app-view');
                        showSkeletonUI();
                    }

                    // [핵심] 메타와 기안 데이터를 병렬로 로드
                    await loadMetaAndDraftsParallel(user, hasCachedUI);
                    
                } else {
                    currentUser = null;
                    localStorage.removeItem(CACHE_KEYS.USER);
                    toggleView('login-view');
                }
            });

            // 이벤트 리스너 등록 (즉시)
            setupEventListeners();
        }

        // [최적화 핵심] 메타 + 기안 병렬 로딩
        async function loadMetaAndDraftsParallel(firebaseUser, hasCachedUI) {
            // 1단계: 캐시에서 즉시 로드
            const cachedMeta = getFromCache(CACHE_KEYS.META, CACHE_EXPIRY_META);
            const cachedDrafts = getFromCache(CACHE_KEYS.DRAFTS, CACHE_EXPIRY_DRAFTS);
            
            let metaFromCache = false;
            let draftsFromCache = false;

            // 캐시된 메타가 있으면 즉시 적용
            if (cachedMeta) {
                userList = cachedMeta.userList || [];
                repairMap = cachedMeta.repairMap || {};
                metaFromCache = true;
            }

            // 유저 매칭 (캐시된 메타로 시도)
            if (userList.length > 0) {
                const matchedUser = userList.find(u => u.email === firebaseUser.email);
                if (matchedUser) {
                    currentUser = { 
                        ...firebaseUser, 
                        name: matchedUser.name, 
                        team: matchedUser.team || '', 
                        role: matchedUser.role || '일반', 
                        confidentialAccess: matchedUser.confidentialAccess,
                        approvalOnly: matchedUser.approvalOnly || false,
                        isAdmin: matchedUser.isAdmin || false
                    };
                } else {
                    currentUser = { ...firebaseUser, name: firebaseUser.displayName, team: '', role: '미등록', confidentialAccess: false, approvalOnly: false, isAdmin: false };
                }
                // 유저 정보 캐시
                saveToCache(CACHE_KEYS.USER, {
                    email: currentUser.email,
                    name: currentUser.name,
                    displayName: firebaseUser.displayName,
                    team: currentUser.team,
                    role: currentUser.role,
                    confidentialAccess: currentUser.confidentialAccess,
                    approvalOnly: currentUser.approvalOnly,
                    isAdmin: currentUser.isAdmin || false
                });
            }

            // 캐시된 기안이 있으면 즉시 렌더링
            if (cachedDrafts && cachedDrafts.length > 0) {
                allFetchedData = cachedDrafts;
                draftsFromCache = true;
            }

            // UI 즉시 표시
            if (!hasCachedUI) {
                renderUserInfo();
                toggleView('app-view');
            } else {
                renderUserInfo(); // 유저 정보 업데이트
            }
            applyRoleBasedUI();

            // 캐시된 기안으로 즉시 렌더링
            if (draftsFromCache) {
                const lastTab = getInitialTab();
                renderWithFilter(lastTab);
            }

            // 초기 탭 클릭
            clickInitialTab();

            // 2단계: [백그라운드] 캐시가 3분 이상 됐을 때만 DB 갱신 (불필요한 Firestore 호출 방지)
            const draftsAge = getCacheAge(CACHE_KEYS.DRAFTS);
            const metaAge = getCacheAge(CACHE_KEYS.META);
            const needsBgUpdate = draftsAge > BG_UPDATE_THRESHOLD || metaAge > BG_UPDATE_THRESHOLD;

            if (needsBgUpdate) {
                setTimeout(() => {
                    const promises = [];
                    if (metaAge > BG_UPDATE_THRESHOLD)
                        promises.push(fetchMetaFromDB().catch(e => console.error('Meta bg update fail:', e)));
                    if (draftsAge > BG_UPDATE_THRESHOLD) {
                        const activeTab = getActiveTabTarget();
                        promises.push(loadDraftsFromDB(activeTab, false).catch(e => console.error('Drafts bg update fail:', e)));
                    }
                    Promise.all(promises).then(() => console.log('[BG] 백그라운드 갱신 완료'));
                }, 3000); // 초기 렌더 완전히 끝난 후 갱신
            }

            // 캐시가 하나도 없었으면 DB에서 직접 로드
            if (!metaFromCache) {
                await fetchMetaFromDB();
                // 유저 재매칭
                const matchedUser = userList.find(u => u.email === firebaseUser.email);
                if (matchedUser) {
                    currentUser = { 
                        ...firebaseUser, 
                        name: matchedUser.name, 
                        team: matchedUser.team || '', 
                        role: matchedUser.role || '일반', 
                        confidentialAccess: matchedUser.confidentialAccess,
                        approvalOnly: matchedUser.approvalOnly || false,
                        isAdmin: matchedUser.isAdmin || false
                    };
                    saveToCache(CACHE_KEYS.USER, {
                        email: currentUser.email,
                        name: currentUser.name,
                        displayName: firebaseUser.displayName,
                        team: currentUser.team,
                        role: currentUser.role,
                        confidentialAccess: currentUser.confidentialAccess,
                        approvalOnly: currentUser.approvalOnly,
                        isAdmin: currentUser.isAdmin || false
                    });
                } else {
                    currentUser = { ...firebaseUser, name: firebaseUser.displayName, team: '', role: '미등록', confidentialAccess: false, approvalOnly: false, isAdmin: false };
                }
                renderUserInfo();
                applyRoleBasedUI();
            }

            if (!draftsFromCache) {
                const activeTab = getActiveTabTarget();
                await loadDraftsFromDB(activeTab, true);
            }

            hideLoading();
        }

        // 캐시된 유저 정보로 즉시 앱 표시
        function applyUserAndShowApp(cached, isFromCache) {
            currentUser = {
                email: cached.email,
                name: cached.name,
                displayName: cached.displayName,
                team: cached.team,
                role: cached.role,
                confidentialAccess: cached.confidentialAccess,
                approvalOnly: cached.approvalOnly,
                isAdmin: cached.isAdmin || false
            };
            
            // 캐시된 메타도 로드
            const cachedMeta = getFromCache(CACHE_KEYS.META, CACHE_EXPIRY_META);
            if (cachedMeta) {
                userList = cachedMeta.userList || [];
                repairMap = cachedMeta.repairMap || {};
            }

            // 캐시된 기안도 로드 & 즉시 표시
            const cachedDrafts = getFromCache(CACHE_KEYS.DRAFTS, CACHE_EXPIRY_DRAFTS);
            if (cachedDrafts && cachedDrafts.length > 0) {
                allFetchedData = cachedDrafts;
            }

            renderUserInfo();
            toggleView('app-view');
            applyRoleBasedUI();

            if (allFetchedData.length > 0) {
                const lastTab = getInitialTab();
                renderWithFilter(lastTab);
                clickInitialTab();
            } else {
                showSkeletonUI();
                clickInitialTab();
            }
        }

        function applyRoleBasedUI() {
            if (!currentUser) return;
            const isAdmin = currentUser.isAdmin;

            if (currentUser.approvalOnly && !isAdmin) {
                document.getElementById('btn-new-draft').classList.add('hidden');
                const myDraftBtn = document.querySelector('[data-target="myDrafts"]');
                if(myDraftBtn) myDraftBtn.classList.add('hidden');
            } else {
                document.getElementById('btn-new-draft').classList.remove('hidden');
                const myDraftBtn = document.querySelector('[data-target="myDrafts"]');
                if(myDraftBtn) myDraftBtn.classList.remove('hidden');
            }
            if (currentUser.team === '회계팀') document.getElementById('nav-accounting').classList.remove('hidden');

            // em시트 E열 '대외비' 계정만 메뉴 노출 (isAdmin·대표 예외 없음)
            if (currentUser.confidentialAccess === true) {
                document.querySelectorAll('.confidential-menu').forEach(el => { el.classList.remove('hidden'); el.classList.add('flex'); });
            }

            // 관리자 뱃지 표시
            if (isAdmin) {
                const nameEl = document.getElementById('user-profile-name');
                if (nameEl && !nameEl.querySelector('.admin-badge')) {
                    nameEl.insertAdjacentHTML('beforeend',
                        '<span class="admin-badge ml-1.5 px-1.5 py-0.5 rounded text-[10px] font-bold bg-purple-100 text-purple-700 border border-purple-200">관리자</span>');
                }
            }
        }

        function getInitialTab() {
            if (currentUser && currentUser.approvalOnly) return 'toApprove';
            const urlParams = new URLSearchParams(window.location.search);
            const targetMenu = urlParams.get('menu');
            if (targetMenu === 'toApprove') return 'toApprove';
            const lastTab = localStorage.getItem(CACHE_KEYS.LAST_TAB);
            return lastTab || 'myDrafts';
        }

        function clickInitialTab() {
            const tab = getInitialTab();
            const btn = document.querySelector(`[data-target="${tab}"]`);
            if (btn) {
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active', 'bg-blue-50', 'text-blue-600'));
                btn.classList.add('active', 'bg-blue-50', 'text-blue-600');
                document.getElementById('page-title').textContent = getTitleByListType(tab);
            }
        }

        function getActiveTabTarget() {
            const activeEl = document.querySelector('.nav-item.active');
            return activeEl ? activeEl.dataset.target : 'myDrafts';
        }

        // =========================================================================
        // 이벤트 리스너 통합 등록
        // =========================================================================
        function setupEventListeners() {
            document.getElementById('btn-login').addEventListener('click', () => signInWithPopup(auth, provider));
            document.getElementById('btn-logout').addEventListener('click', () => {
                localStorage.removeItem(CACHE_KEYS.USER);
                signOut(auth);
            });
            document.getElementById('btn-new-draft').addEventListener('click', openNewDraftModal);
            
            document.getElementById('btn-refresh').addEventListener('click', () => {
                showToast('최신 데이터를 가져옵니다.');
                const activeTab = getActiveTabTarget();
                // localStorage + 메모리 캐시 모두 초기화 후 서버에서 강제 재조회
                localStorage.removeItem(CACHE_KEYS.DRAFTS);
                allFetchedData = [];
                loadDraftsFromDB(activeTab, true, true);
            });

            // [최적화] 검색 디바운스 적용
            let searchTimeout;
            document.getElementById('search-input').addEventListener('keyup', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => runSearch(e.target.value), 150);
            });
            
            const sidebar = document.getElementById('main-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            window.toggleSidebar = () => {
                const isClosed = sidebar.classList.contains('-translate-x-full');
                if (isClosed) {
                    sidebar.classList.remove('-translate-x-full'); 
                    overlay.classList.remove('hidden');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
            };

            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active', 'bg-blue-50', 'text-blue-600'));
                    e.currentTarget.classList.add('active', 'bg-blue-50', 'text-blue-600');
                    const target = e.currentTarget.dataset.target;
                    localStorage.setItem(CACHE_KEYS.LAST_TAB, target);
                    loadDrafts(target);
                    
                    if (window.innerWidth < 768) {
                        window.toggleSidebar();
                    }
                });
            });

            document.querySelectorAll('[data-close-modal]').forEach(btn => {
                btn.addEventListener('click', () => closeModal(btn.dataset.closeModal));
            });
            
            document.getElementById('btn-save-draft').addEventListener('click', saveDraft);
        }

        // =========================================================================
        // Google Sheet 동기화 & 이메일 발송 (비동기, fire-and-forget)
        // =========================================================================
        async function syncToGoogleSheet(draftData) {
            if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("여기에")) return;
            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(draftData)
                });
            } catch (error) {
                console.error('[Google Sheet Sync] 전송 실패:', error);
                showToast('구글 시트 연동 실패', true);
            }
        }

        async function loadDrafts(listType, forceUpdate = false) {

        async function loadDraftsFromDB(listType, showSpinner = false, forceServer = false) {
            const listContainer = document.getElementById('draft-list-container');
            
            if (showSpinner && allFetchedData.length === 0) {
                showSkeletonUI();
            }

            try {
                // [핵심] drafts_index (경량) + drafts (원본) 병렬 조회 후 병합
                const indexQ = query(collection(db, 'drafts_index'), orderBy('createdAt', 'desc'), limit(500));
                const draftsQ = query(collection(db, 'drafts'), orderBy('createdAt', 'desc'), limit(500));

                const [indexSnap, draftsSnap] = await Promise.all([
                    (forceServer ? getDocsFromServer(indexQ) : getDocs(indexQ)).catch(() => ({ forEach: () => {} })),
                    (forceServer ? getDocsFromServer(draftsQ) : getDocs(draftsQ)).catch(() => ({ forEach: () => {} }))
                ]);

                // 1단계: drafts_index 결과 수집
                const indexMap = new Map();
                indexSnap.forEach((docSnap) => {
                    const d = { id: docSnap.id, ...docSnap.data() };
                    indexMap.set(d.docId || d.id, d);
                });

                // 2단계: drafts에서 drafts_index에 없는 문서 보충
                const missingDocs = [];
                draftsSnap.forEach((docSnap) => {
                    const d = { id: docSnap.id, ...docSnap.data() };
                    const key = d.docId || d.id;
                    if (!indexMap.has(key)) {
                        // content/attachments 제거한 경량 버전으로 리스트에 추가
                        const lightweight = { ...d };
                        delete lightweight.content;
                        delete lightweight.attachments;
                        indexMap.set(key, lightweight);
                        missingDocs.push(d);
                    }
                });

                // 3단계: 병합 결과를 최신순 정렬
                let drafts = Array.from(indexMap.values());
                drafts.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

                allFetchedData = drafts.map(serverDoc => {
                    // ★ 최근 결재 처리한 문서는 draftCache(Optimistic) 데이터 유지
                    if (recentlyUpdatedDocIds.has(serverDoc.docId) && draftCache[serverDoc.docId]) {
                        return draftCache[serverDoc.docId];
                    }
                    return serverDoc;
                }); 
                saveToCache(CACHE_KEYS.DRAFTS, allFetchedData);
                renderWithFilter(listType || getActiveTabTarget());

                // 4단계: 누락 문서 drafts_index 자동 복구 (fire-and-forget)
                if (missingDocs.length > 0) {
                    console.log(`[자동복구] drafts_index 누락 ${missingDocs.length}건 복구 시작`);
                    for (const d of missingDocs) {
                        saveIndexDoc(d).catch(() => {});
                    }
                }

            } catch (error) {
                console.error(error);
                if (showSpinner && allFetchedData.length === 0) {
                    listContainer.innerHTML = `<div class="text-center p-10 text-gray-500">데이터 로드 실패<br>${error.message}</div>`;
                }
            }
        }

        function runSearch(keyword) {
            const term = keyword.toLowerCase().trim();
            const activeTab = getActiveTabTarget();
            const hintEl = document.getElementById('global-search-hint');

            // 전체 검색 모드 해제 시 로컬 데이터로 복귀
            if (!term) {
                isGlobalSearchMode = false;
                globalSearchKeyword = '';
                globalSearchResults = [];
                if (hintEl) hintEl.classList.add('hidden');
                filteredDisplayData = allFetchedData.filter(draft => filterDraft(draft, activeTab));
                renderPaginatedItems();
                return;
            }

            // 전체 검색 모드 중이면 globalSearchResults 표시 (권한 필터 적용)
            if (isGlobalSearchMode && globalSearchKeyword === term) {
                filteredDisplayData = globalSearchResults.filter(d => filterDraft(d, activeTab));
                renderPaginatedItems();
                return;
            }

            // 로컬(30건) 검색 — filterDraft 권한 체크 필수 적용
            filteredDisplayData = allFetchedData.filter(draft => {
                if (!filterDraft(draft, activeTab)) return false;
                const matchesKeyword = (draft.title && draft.title.toLowerCase().includes(term)) ||
                       (draft.drafter && draft.drafter.toLowerCase().includes(term)) ||
                       (draft.docId && draft.docId.toLowerCase().includes(term)) ||
                       (draft.corporation && draft.corporation.includes(term));
                return matchesKeyword;
            });

            // 로컬 결과 힌트 표시 (항상 "전체 검색" 버튼 노출)
            if (hintEl) {
                hintEl.classList.remove('hidden');
                hintEl.innerHTML = `
                    <div class="flex items-center justify-between gap-3 px-4 py-2.5 bg-amber-50 border border-amber-200 rounded-xl text-sm">
                        <span class="text-amber-700">
                            <i class="bi bi-clock-history mr-1"></i>
                            최근 50건 기준 검색 결과 <strong>${filteredDisplayData.length}건</strong>
                        </span>
                        <button onclick="searchGlobal('${term.replace(/'/g, "\'")}')"
                            class="flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-3 py-1.5 rounded-lg shadow transition whitespace-nowrap">
                            <i class="bi bi-search"></i> 전체 기간 검색
                        </button>
                    </div>`;
            }
            renderPaginatedItems();
        }

        async function fetchGlobalSearchResults(term, lim) {
            const queries = [];
            const termLower = term.toLowerCase();
            const UPPER = term + '';

            // ── [A] drafts_index searchTokens array-contains (부분 검색 핵심) ──
            // 2글자 이상 토큰으로 검색 (1글자는 너무 광범위)
            const searchToken = term.length >= 2 ? term : null;
            if (searchToken) {
                queries.push(
                    getDocs(query(collection(db, 'drafts_index'),
                        where('searchTokens', 'array-contains', searchToken),
                        orderBy('createdAt', 'desc'),
                        limit(lim)))
                        .then(snap => snap.docs.map(d => ({id: d.id, ...d.data()})))
                        .catch(e => { console.warn('[전체검색] searchTokens 쿼리 오류:', e); return []; })
                );
            }

            // 1. docId 정확 매칭
            queries.push(
                getDocs(query(collection(db, 'drafts'), where('docId', '==', term)))
                    .then(snap => snap.docs.map(d => ({id: d.id, ...d.data()})))
                    .catch(() => [])
            );

            // 2. 제목 prefix 범위 검색 (한글/영문 시작어)
            queries.push(
                getDocs(query(collection(db, 'drafts'),
                    orderBy('title'),
                    where('title', '>=', term),
                    where('title', '<=', term + ''),
                    limit(lim)))
                    .then(snap => snap.docs.map(d => ({id: d.id, ...d.data()})))
                    .catch(() => [])
            );

            // 3. 기안자 이름으로 이메일 찾아 쿼리
            const matchedUsers = userList.filter(u => u.name && u.name.includes(term));
            for (const u of matchedUsers.slice(0, 3)) {
                queries.push(
                    getDocs(query(collection(db, 'drafts'),
                        where('drafterEmail', '==', u.email),
                        orderBy('createdAt', 'desc'),
                        limit(lim)))
                        .then(snap => snap.docs.map(d => ({id: d.id, ...d.data()})))
                        .catch(() => [])
                );
            }

            // 4. 법인명 매칭
            const corpNames = ['동영(파주)', '동영투어', '동영(용인)', '동영(서울)'];
            const matchedCorp = corpNames.find(c => c.includes(term));
            if (matchedCorp) {
                queries.push(
                    getDocs(query(collection(db, 'drafts'),
                        where('corporation', '==', matchedCorp),
                        orderBy('createdAt', 'desc'),
                        limit(lim)))
                        .then(snap => snap.docs.map(d => ({id: d.id, ...d.data()})))
                        .catch(() => [])
                );
            }

            // 5. 카테고리 정확 매칭
            const categories = ['보고', '경비', '직영수리비', '인사', '업무', '대외비'];
            const matchedCat = categories.find(c => c === term);
            if (matchedCat) {
                queries.push(
                    getDocs(query(collection(db, 'drafts'),
                        where('category', '==', matchedCat),
                        orderBy('createdAt', 'desc'),
                        limit(lim)))
                        .then(snap => snap.docs.map(d => ({id: d.id, ...d.data()})))
                        .catch(() => [])
                );
            }

            const allResults = await Promise.all(queries);

            // 중복 제거 후 최신순 정렬
            const seen = new Set();
            const merged = [];
            for (const arr of allResults) {
                for (const d of arr) {
                    const key = d.docId || d.id;
                    if (!seen.has(key)) {
                        seen.add(key);
                        merged.push(d);
                        if (d.docId) draftCache[d.docId] = d;
                    }
                }
            }
            merged.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
            return merged;
        }

        function renderPaginationControls() {
            const container = document.getElementById('pagination-container');
            container.innerHTML = '';
            
            const totalCount = filteredDisplayData.length;
            if (totalCount === 0) return;

            const totalPages = Math.ceil(totalCount / itemsPerPage);
            
            const prevBtn = document.createElement('button');
            prevBtn.className = `w-8 h-8 rounded-full flex items-center justify-center text-sm ${currentPage === 1 ? 'text-gray-300 cursor-not-allowed' : 'text-gray-600 hover:bg-gray-100'}`;
            prevBtn.innerHTML = '<i class="bi bi-chevron-left"></i>';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => { if(currentPage > 1) { currentPage--; renderPaginatedItems(); container.scrollIntoView({block: "end"}); }};
            container.appendChild(prevBtn);

            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);
            if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

            for (let i = startPage; i <= endPage; i++) {
                const btn = document.createElement('button');
                const isActive = i === currentPage;
                btn.className = `w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium transition ${isActive ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'}`;
                btn.textContent = i;
                btn.onclick = () => { currentPage = i; renderPaginatedItems(); }; 
                container.appendChild(btn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.className = `w-8 h-8 rounded-full flex items-center justify-center text-sm ${currentPage === totalPages ? 'text-gray-300 cursor-not-allowed' : 'text-gray-600 hover:bg-gray-100'}`;
            nextBtn.innerHTML = '<i class="bi bi-chevron-right"></i>';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => { if(currentPage < totalPages) { currentPage++; renderPaginatedItems(); }};
            container.appendChild(nextBtn);
            
            const countSpan = document.createElement('span');
            countSpan.className = "ml-4 text-xs text-gray-400 absolute right-4 hidden md:block";
            countSpan.textContent = `총 ${totalCount}건`;
            container.appendChild(countSpan);
        }

        function filterDraft(draft, listType) {
            const isConfidential = draft.category === '대외비';

            // ── 대외비 권한: em시트 E열 '대외비' 마킹 계정만 (isAdmin·대표·임원 등 예외 없음)
            const canViewConfidential = currentUser && currentUser.confidentialAccess === true;

            // 대외비 문서 처리 원칙
            if (isConfidential) {
                switch (listType) {
                    case 'myDrafts':
                        // 본인이 직접 올린 대외비만 본인에게 허용
                        return currentUser && draft.drafterEmail === currentUser.email;
                    case 'toApproveConfidential':
                        // 대외비 권한자 + 본인이 결재자인 경우만
                        if (!canViewConfidential) return false;
                        return currentUser && ((draft.approver1Email === currentUser.email && !draft.approval1Status) ||
                               (draft.approver2Email === currentUser.email && draft.approval1Status === '결재' && !draft.approval2Status));
                    case 'allConfidentialDrafts':
                        // 대외비 권한자만 전체 열람
                        return canViewConfidential;
                    default:
                        // toApprove, allDrafts, 회계팀 탭 등 모든 나머지 탭 — 완전 차단
                        return false;
                }
            }

            // ── 일반 문서 (대외비 아닌 경우) ──
            const isAdmin = currentUser && currentUser.isAdmin;
            const isAccountingTarget = currentUser && (currentUser.team === '회계팀') &&
                                       ['경비', '직영수리비'].includes(draft.category) &&
                                       draft.approval2Status === '결재' &&
                                       !draft.paymentDate;

            switch (listType) {
                case 'myDrafts':
                    return currentUser && draft.drafterEmail === currentUser.email;
                case 'toApprove':
                    return currentUser && ((draft.approver1Email === currentUser.email && !draft.approval1Status) ||
                           (draft.approver2Email === currentUser.email && draft.approval1Status === '결재' && !draft.approval2Status));
                case 'toApproveConfidential':
                    return false; // 일반 문서는 대외비 탭에 표시 안 함
                case 'allDrafts':
                    return true;
                case 'allConfidentialDrafts':
                    return false; // 일반 문서는 대외비 탭에 표시 안 함
                case 'acc-paju': return isAccountingTarget && draft.corporation === '동영(파주)';
                case 'acc-yongin': return isAccountingTarget && draft.corporation === '동영(용인)';
                case 'acc-seoul': return isAccountingTarget && draft.corporation === '동영(서울)';
                case 'acc-tour': return isAccountingTarget === true && draft.corporation === '동영투어';
                default: return false;
            }
        }

        // =========================================================================
        // [drafts_index] n-gram 토큰 생성 + 경량 인덱스 저장
        // =========================================================================
        function generateSearchTokens(text) {
            if (!text) return [];
            const clean = text.replace(/\s+/g, ''); // 공백 제거
            const tokens = new Set();
            // 1-gram ~ 4-gram 생성
            for (let size = 1; size <= 4; size++) {
                for (let i = 0; i <= clean.length - size; i++) {
                    tokens.add(clean.substring(i, i + size));
                }
            }
            // 원본 공백 포함 단어도 추가 (단어 단위 검색)
            text.split(/\s+/).forEach(w => { if (w) tokens.add(w); });
            return [...tokens].slice(0, 500); // Firestore array 필드 한계 대비
        }

        function buildIndexDoc(draftData) {
            // content, attachments 제외한 경량 인덱스 문서
            const tokens = generateSearchTokens(
                [draftData.title, draftData.drafter, draftData.category, draftData.corporation].join(' ')
            );
            return {
                docId:           draftData.docId,
                title:           draftData.title,
                category:        draftData.category,
                corporation:     draftData.corporation,
                drafter:         draftData.drafter,
                drafterEmail:    draftData.drafterEmail,
                date:            draftData.date,
                createdAt:       draftData.createdAt,
                approver1Email:  draftData.approver1Email,
                approver1Name:   draftData.approver1Name,
                approver2Email:  draftData.approver2Email,
                approver2Name:   draftData.approver2Name,
                approval1Status: draftData.approval1Status  ?? null,
                approval2Status: draftData.approval2Status  ?? null,
                paymentDate:     draftData.paymentDate      ?? null,
                searchTokens:    tokens
            };
        }

        async function saveIndexDoc(draftData) {
            try {
                const idxDoc = buildIndexDoc(draftData);
                await setDoc(doc(db, 'drafts_index', draftData.docId), idxDoc);
            } catch(e) { console.warn('[drafts_index] 인덱스 저장 실패:', e); }
        }

        async function updateIndexDoc(docId, updateData) {
            try {
                // approval/payment 필드만 업데이트
                const allowed = ['approval1Status','approval1Comment','approval2Status',
                                 'approval2Comment','finalApprovalDate','paymentDate'];
                const filtered = {};
                allowed.forEach(k => { if (k in updateData) filtered[k] = updateData[k]; });
                if (Object.keys(filtered).length === 0) return;
                await updateDoc(doc(db, 'drafts_index', docId), filtered);
            } catch(e) {
                // ★ drafts_index에 문서가 없으면 draftCache에서 전체 인덱스 재생성
                console.warn('[drafts_index] update 실패, setDoc 폴백 시도:', e);
                try {
                    const cached = draftCache[docId];
                    if (cached) {
                        const idxDoc = buildIndexDoc({ ...cached, ...updateData });
                        await setDoc(doc(db, 'drafts_index', docId), idxDoc);
                    }
                } catch(e2) { console.error('[drafts_index] 폴백도 실패:', e2); }
            }
        }

                const app1Name  = isJeonGyeol ? '전결' : getUserNameByEmail(approver1Input);
                
                const app1Status = isJeonGyeol ? '결재' : (isNew ? null : (draftCache[newDocId].approval1Status || null));
                const app1Comment = isJeonGyeol ? '전결 처리' : (isNew ? null : (draftCache[newDocId].approval1Comment || null));

                const draftData = {
                    docId: newDocId,

                    title: document.getElementById('input-title').value,
                    content: document.getElementById('input-content').innerHTML,

                    attachments: finalAttachments, 
                    
                    drafter: isNew ? currentUser.name : (draftCache[newDocId].drafter),
                    drafterEmail: isNew ? currentUser.email : (draftCache[newDocId].drafterEmail),
                    createdAt: isNew ? serverTimestamp() : (draftCache[newDocId].createdAt),
                    date: isNew ? new Date().toISOString().split('T')[0] : (draftCache[newDocId].date),
                    
                    approval2Status: isNew ? null : (draftCache[newDocId].approval2Status || null),
                    paymentDate: isNew ? null : (draftCache[newDocId].paymentDate || null)
                };
                
                if (isNew) await setDoc(doc(db, "drafts", newDocId), draftData);
                else await updateDoc(doc(db, "drafts", newDocId), draftData);

                // drafts_index 동시 저장 (fire-and-forget, 실패해도 메인 저장엔 영향 없음)

                // ── Optimistic Update ──
                // createdAt은 serverTimestamp()라 null일 수 있으므로 임시값 설정
                const _inMemory = { ...draftData, createdAt: draftData.createdAt || { seconds: Date.now() / 1000 } };
                draftCache[newDocId] = _inMemory;
                if (isNew) {
                    allFetchedData.unshift(_inMemory);
                } else {
                    const _sidx = allFetchedData.findIndex(d => d.docId === newDocId);
                    if (_sidx !== -1) allFetchedData[_sidx] = _inMemory;
                }
                localStorage.removeItem(CACHE_KEYS.DRAFTS);

                const activeTab = getActiveTabTarget();
                renderWithFilter(activeTab);
                setTimeout(() => loadDraftsFromDB(activeTab, false).catch(() => {}), 2000);

            } catch (error) { 
                console.error(error); 
                showToast('오류 발생: ' + error.message, true); 
            } finally { 
                hideLoading(); 
                saveBtn.disabled = false;
                saveBtn.innerText = '저장하기';
            }
        }

        async function generateDocId() {
            const counterRef = doc(db, 'meta', 'counters');
            const year = new Date().getFullYear().toString();
            return await runTransaction(db, async (transaction) => {
                const counterDoc = await transaction.get(counterRef);
                let newCount = 1;
                if (counterDoc.exists() && counterDoc.data().year === year) newCount = counterDoc.data().count + 1;
                transaction.set(counterRef, { year: year, count: newCount });
                return `${year}-${String(newCount).padStart(4, '0')}`;
            });
        }

        window.submitApprovalComment = async () => {
            const comment = document.getElementById('input-comment-text').value.trim();
            const docId = pendingDocId;
            const action = pendingAction;

            if (action === 'reject' && !comment) { 
                alert('반려 사유는 필수입니다.'); 
                return; 
            }

            const btn = document.getElementById('btn-submit-comment');
            btn.disabled = true;
            btn.innerText = '처리 중...';

            showLoading('처리 중...');
            
            try {
                const docRef = doc(db, 'drafts', docId);
                const draft = draftCache[docId];
                const updateData = {};
                const status = action === 'approve' ? '결재' : '반려';
                
                if (draft.approver1Email === currentUser.email && !draft.approval1Status) {
                    // 1차 결재
                    updateData.approval1Status = status;
                    updateData.approval1Comment = comment;
                } else if (draft.approver2Email === currentUser.email && draft.approval1Status === '결재') {
                    // 2차 결재
                    updateData.approval2Status = status;
                    updateData.approval2Comment = comment;
                    if (status === '결재') updateData.finalApprovalDate = new Date().toISOString();
                } else {
                    throw new Error('권한 없음');
                }
                
                await updateDoc(docRef, updateData);
                await updateIndexDoc(docId, updateData); // ★ await로 drafts_index 반영 보장

                const fullSyncedData = { ...draft, ...updateData };
                syncToGoogleSheet(fullSyncedData);

                if (status === '반려') {
                    sendEmailNotification('REJECT', fullSyncedData);
                } else if (status === '결재') {
                    if (draft.approver2Email === currentUser.email) {
                        sendEmailNotification('APPROVED', fullSyncedData);
                    } else if (draft.approver1Email === currentUser.email) {
                        sendEmailNotification('REMIND', fullSyncedData); 
                    }
                }

                // ── Optimistic Update: 메모리 즉시 반영, DB 재조회 없음 ──
                draftCache[docId] = fullSyncedData;
                const _aidx = allFetchedData.findIndex(d => d.docId === docId);
                if (_aidx !== -1) allFetchedData[_aidx] = fullSyncedData;
                localStorage.removeItem(CACHE_KEYS.DRAFTS);

                // ★ 백그라운드 갱신 시 서버 stale 데이터가 Optimistic을 덮어쓰지 않도록 보호

                setTimeout(() => loadDraftsFromDB(getActiveTabTarget(), false).catch(() => {}), 2000);

        // ── 커스텀 Confirm 다이얼로그 (Promise 기반) ────────────────────
        function showConfirm({ title, message, confirmText = '확인', cancelText = '취소', type = 'info' } = {}) {
            return new Promise(resolve => {
                const isDanger = type === 'danger';
                const overlay = document.createElement('div');
                overlay.className = 'fixed inset-0 z-[300] flex items-center justify-center';
                overlay.innerHTML = `
                    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
                    <div class="relative w-full max-w-sm mx-4 bg-white rounded-2xl shadow-2xl overflow-hidden" style="animation:fadeInUp .22s cubic-bezier(.16,1,.3,1)">
                        <div class="px-6 pt-6 pb-2 flex items-start gap-4">
                            <div class="shrink-0 w-10 h-10 rounded-full flex items-center justify-center ${isDanger ? 'bg-red-100' : 'bg-blue-100'}">
                                <i class="bi ${isDanger ? 'bi-exclamation-triangle-fill text-red-500' : 'bi-question-circle-fill text-blue-500'} text-lg"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <h3 class="text-base font-bold text-gray-900 mb-1">${title || '확인'}</h3>
                                <p class="text-sm text-gray-500 leading-relaxed">${message || ''}</p>
                            </div>
                        </div>
                        <div class="px-6 py-4 flex justify-end gap-2">
                            <button id="_cfm_cancel" class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 text-sm font-medium transition">${cancelText}</button>
                            <button id="_cfm_ok" class="px-5 py-2 rounded-lg text-white text-sm font-bold shadow-sm transition ${isDanger ? 'bg-red-500 hover:bg-red-600' : 'bg-blue-600 hover:bg-blue-700'}">${confirmText}</button>
                        </div>
                    </div>`;
                document.body.appendChild(overlay);
                const close = (result) => { overlay.remove(); resolve(result); };
                overlay.querySelector('#_cfm_ok').onclick = () => close(true);
                overlay.querySelector('#_cfm_cancel').onclick = () => close(false);
                overlay.querySelector('.absolute').onclick = () => close(false);
            });
        }

        // 이 문서를 열람할 수 있는 계정인지 확인 (기안자 / 1차결재자 / 2차결재자만)
        function isConfidentialViewer(draft) {
            if (!currentUser) return false;
            return draft.drafterEmail === currentUser.email ||
                   draft.approver1Email === currentUser.email ||
                   draft.approver2Email === currentUser.email;
        }

        // Google 재인증 팝업 — Promise 반환 (성공: true / 실패: false)
        async function reAuthWithGoogle() {
            try {
                const result = await signInWithPopup(auth, provider);
                // 재인증한 계정이 현재 로그인 계정과 동일한지 확인
                if (result.user.email !== currentUser.email) {
                    showToast('본인 계정으로 인증해주세요.', 'warning');
                    return false;
                }
                confidentialAuthTime = Date.now();
                return true;
            } catch(e) {
                return false; // 팝업 닫거나 취소 시
            }
        }

        // 대외비 열람 로그 기록 (Firestore accessLogs)
        async function logConfidentialAccess(draft) {
            try {
                const role = draft.drafterEmail === currentUser.email ? '기안자'
                           : draft.approver1Email === currentUser.email ? '1차결재자'
                           : draft.approver2Email === currentUser.email ? '2차결재자'
                           : '기타';
                await setDoc(doc(collection(db, 'accessLogs')), {
                    docId:       draft.docId,
                    docTitle:    draft.title,
                    category:    draft.category,
                    viewer:      currentUser.email,
                    viewerName:  currentUser.name,
                    role:        role,
                    authMethod:  'google_reauth',
                    timestamp:   new Date().toISOString()
                });
            } catch(e) { console.warn('[accessLog] 기록 실패:', e); }
        }

        window.openDetailModal = async (docId) => {
            // drafts_index는 content/attachments/refLinks 없음 → 상세 조회 시 원본 drafts 단건 fetch
            let draft = draftCache[docId];
            if (!draft) return;

            // ── 대외비 이중 보안 ──────────────────────────────────────────
            if (draft.category === '대외비') {

                // [1단계] 기안자 / 1차결재자 / 2차결재자만 열람 가능
                if (!isConfidentialViewer(draft)) {
                    showToast('이 문서에 대한 열람 권한이 없습니다.', 'warning');
                    return;
                }

                // [2단계] 30분 내 재인증 기록 없으면 Google 재인증 팝업
                const isRecentlyAuthed = confidentialAuthTime &&
                    (Date.now() - confidentialAuthTime < CONFIDENTIAL_SESSION_MS);

                if (!isRecentlyAuthed) {
                    // 재인증 안내 confirm
                    const proceed = await showConfirm({
                        title: '대외비 문서 본인 확인',
                        message: '대외비 문서 열람을 위해 Google 계정 재인증이 필요합니다.<br><span class="text-xs text-gray-400">인증 후 30분간 유효합니다.</span>',
                        confirmText: '인증하기',
                        cancelText: '취소',
                        type: 'info'
                    });
                    if (!proceed) return;

                    showLoading('본인 확인 중...');
                    const authed = await reAuthWithGoogle();
                    hideLoading();

                    if (!authed) {
                        showToast('인증이 취소되었습니다.', 'warning');
                        return;
                    }
                }

                // [3단계] 열람 로그 기록 (fire-and-forget)
                logConfidentialAccess(draft);
            }
            // ─────────────────────────────────────────────────────────────

            // content 필드가 없으면 원본 drafts에서 조회 (drafts_index 출처 문서)
            if (draft.content === undefined) {
                const modal = document.getElementById('modal-detail');
                document.getElementById('detail-content').innerHTML =
                    '<div class="text-center text-gray-400 py-8"><i class="bi bi-hourglass-split animate-spin mr-2"></i>내용 불러오는 중...</div>';
                modal.classList.remove('hidden');
                try {
                    const fullSnap = await getDoc(doc(db, 'drafts', docId));
                    if (fullSnap.exists()) {
                        const prevAppr1 = draft.approval1Status;
                        const prevAppr2 = draft.approval2Status;
                        draft = { ...draft, ...fullSnap.data() };
                        draftCache[docId] = draft; // 캐시 업데이트

                        // ★ drafts_index ↔ drafts 불일치 자동 보정
                        const statusChanged = prevAppr1 !== draft.approval1Status || prevAppr2 !== draft.approval2Status;
                        if (statusChanged) {
                            console.log(`[자동보정] ${docId}: index(${prevAppr1}/${prevAppr2}) → drafts(${draft.approval1Status}/${draft.approval2Status})`);
                            // allFetchedData(리스트 소스) 즉시 반영
                            const _fixIdx = allFetchedData.findIndex(d => d.docId === docId);
                            if (_fixIdx !== -1) {
                                allFetchedData[_fixIdx] = { ...allFetchedData[_fixIdx], 
                                    approval1Status: draft.approval1Status, 
                                    approval2Status: draft.approval2Status,
                                    finalApprovalDate: draft.finalApprovalDate || null
                                };
                            }
                            localStorage.removeItem(CACHE_KEYS.DRAFTS);
                            // drafts_index DB도 비동기 보정 (fire-and-forget)
                            updateIndexDoc(docId, {
                                approval1Status: draft.approval1Status,
                                approval2Status: draft.approval2Status,
                                finalApprovalDate: draft.finalApprovalDate || null
                            });
                            // 리스트 즉시 리렌더 (모달 뒤에서 갱신됨)
                            renderWithFilter(getActiveTabTarget());
                        }
                    }
                } catch(e) { console.warn('원본 drafts 조회 실패:', e); }
            }
            const modal = document.getElementById('modal-detail');
            document.getElementById('detail-doc-id').textContent = draft.docId;
            document.getElementById('detail-title').textContent = draft.title;
            
            const refDept = draft.ref ? ` | 참조: ${draft.ref}` : '';

            const paymentInfo = draft.paymentDate 
                ? `<div class="w-full mt-3 mb-1 p-3 bg-indigo-50 border border-indigo-200 rounded-lg text-indigo-800 font-bold flex items-center justify-center gap-2 shadow-sm">
                     <i class="bi bi-check-circle-fill text-indigo-600 text-lg"></i> 
                     <span>회계팀 지급 완료 : <span class="underline underline-offset-4">${draft.paymentDate}</span></span>
                   </div>` 
                : '';

            document.getElementById('detail-info').innerHTML = `
                <div class="flex flex-wrap items-center gap-2 mb-2">
                    <span class="px-2 py-1 rounded text-xs font-bold bg-blue-50 text-blue-700 border border-blue-100">${draft.category}</span>
                    <span class="px-2 py-1 rounded text-xs font-medium bg-gray-100 text-gray-600 border border-gray-200">${draft.corporation}</span>
                </div>
                ${paymentInfo}
                <div class="mt-2 text-xs text-gray-500 flex items-center gap-2 w-full pt-2 border-t border-dashed">
                    <span><i class="bi bi-person"></i> ${draft.drafter}</span>
                    <span class="text-gray-300">|</span>
                    <span>${draft.date}</span>
                    ${refDept ? `<span class="text-blue-600 font-medium ml-auto">${refDept}</span>` : ''}
                </div>
            `;
            document.getElementById('detail-content').innerHTML = draft.content;
            
            const linksContainer = document.getElementById('detail-links');
            linksContainer.innerHTML = '';
            if (draft.refLinks) {
                draft.refLinks.forEach(link => {
                    const url = link.url || link; 
                    const title = link.title || url;
                    linksContainer.innerHTML += `
                        <a href="${url}" target="_blank" class="flex items-center gap-2 bg-blue-50 hover:bg-blue-100 border border-blue-100 text-blue-700 px-3 py-2 rounded-lg mb-2 transition group">
                            <i class="bi bi-link-45deg text-lg group-hover:scale-110 transition-transform"></i>
                            <span class="text-sm font-medium truncate">${title}</span>
                            <i class="bi bi-box-arrow-up-right text-xs ml-auto opacity-50"></i>
                        </a>`;
                });
            }

            const filesContainer = document.getElementById('detail-files');
            filesContainer.innerHTML = '';
            if (draft.attachments) {
                const isConfidentialDoc = draft.category === '대외비';
                draft.attachments.forEach(file => {
                    if (isConfidentialDoc) {
                        // 대외비 첨부파일: 클릭 시 로그 기록 후 열기
                        filesContainer.innerHTML += `<button
                            onclick="openConfidentialFile('${draft.docId}', '${file.name.replace(/'/g,"\'")}', '${file.url.replace(/'/g,"\'")}')"
                            class="inline-flex items-center px-3 py-1 rounded-full border border-red-200 bg-red-50 text-xs text-red-700 hover:bg-red-100 mr-2 mb-2 cursor-pointer">
                            <i class="bi bi-shield-lock-fill mr-1"></i> ${file.name}
                        </button>`;
                    } else {
                        filesContainer.innerHTML += `<a href="${file.url}" target="_blank" class="inline-flex items-center px-3 py-1 rounded-full border border-gray-300 bg-gray-50 text-xs text-gray-700 hover:bg-gray-100 mr-2 mb-2"><i class="bi bi-paperclip mr-1"></i> ${file.name}</a>`;
                    }
                });
            }

            renderApprovalStatus('detail-appr1', draft.approver1Name, draft.approval1Status, draft.approval1Comment);
            renderApprovalStatus('detail-appr2', draft.approver2Name, draft.approval2Status, draft.approval2Comment);

            const btnArea = document.getElementById('detail-actions');
            btnArea.innerHTML = '';
            const isAdmin = currentUser.isAdmin;
            // 승인/반려 버튼: 본인이 실제 결재자일 때만 (관리자는 별도 패널에서 상태 수정)
            const isAppr1 = draft.approver1Email === currentUser.email && !draft.approval1Status;
            const isAppr2 = draft.approver2Email === currentUser.email && draft.approval1Status === '결재' && !draft.approval2Status;
            
            if (isAppr1 || isAppr2) {
                btnArea.innerHTML = `<button onclick="processApproval('${draft.docId}', 'approve')" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 mr-2 text-sm shadow-sm">승인</button><button onclick="processApproval('${draft.docId}', 'reject')" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 text-sm shadow-sm">반려</button>`;
            }

            const isJeonGyeol = draft.approver1Name === '전결' || draft.approver1Email === 'jeongyeol';
            // 관리자: 모든 문서(대외비 포함) 모든 상태에서 수정 가능
            const canEdit = isAdmin ||
                            ((draft.drafterEmail === currentUser.email && !currentUser.approvalOnly) &&
                            (!draft.approval1Status || (isJeonGyeol && !draft.approval2Status)));

            if (canEdit) {
                btnArea.innerHTML += `<button onclick="editDraft('${draft.docId}')" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 mr-2 text-sm flex items-center gap-1 shadow-sm"><i class="bi bi-pencil"></i> 수정</button>`;
            }

            if (draft.drafterEmail === currentUser.email && !draft.paymentDate && draft.approval2Status !== '결재' && draft.approval1Status !== '반려' && draft.approval2Status !== '반려') {
                btnArea.innerHTML += `<button onclick="triggerRemind('${draft.docId}')" class="bg-orange-500 text-white px-4 py-2 rounded hover:bg-orange-600 ml-2 text-sm flex items-center gap-1 shadow-sm"><i class="bi bi-bell"></i> 독촉</button>`;
            }

            btnArea.innerHTML += `<button onclick="window.print()" class="bg-gray-700 text-white px-4 py-2 rounded hover:bg-gray-800 ml-2 text-sm flex items-center gap-1 shadow-sm"><i class="bi bi-printer"></i> 인쇄</button>`;

            const paymentArea = document.getElementById('detail-payment-area');
            paymentArea.classList.add('hidden');
            if (currentUser.team === '회계팀' && ['경비', '직영수리비'].includes(draft.category) && draft.approval2Status === '결재' && !draft.paymentDate) {
                paymentArea.classList.remove('hidden');
                const repairRaw = repairMap[draft.docId];
                const repairFormatted = repairRaw ? Number(repairRaw).toLocaleString('ko-KR') + '원' : null;
                let infoMsg = draft.category === '직영수리비' ? (repairFormatted ? `<div class="text-blue-600 text-xs font-bold mb-2">수리비: ${repairFormatted}</div>` : `<div class="text-red-500 text-xs font-bold mb-2">수리비 없음</div>`) : '';
                document.getElementById('repair-cost-display').innerHTML = infoMsg;
            }

            // 관리자 패널 표시 및 현재 결재 상태 세팅
            const adminPanel = document.getElementById('admin-approval-panel');
            if (isAdmin) {
                adminPanel.classList.remove('hidden');
                // 결재자 드롭다운 옵션 채우기
                const userOptions = userList.map(u =>
                    `<option value="${u.email}">${u.name} (${u.team})</option>`
                ).join('');
                ['admin-approver1-email','admin-approver2-email'].forEach(id => {
                    const sel = document.getElementById(id);
                    sel.innerHTML = '<option value="">선택</option>' + userOptions;
                });
                // 현재 값으로 초기화
                document.getElementById('admin-approver1-email').value = draft.approver1Email || '';
                document.getElementById('admin-approval1-status').value = draft.approval1Status || '';
                document.getElementById('admin-approval1-comment').value = draft.approval1Comment || '';
                document.getElementById('admin-approver2-email').value = draft.approver2Email || '';
                document.getElementById('admin-approval2-status').value = draft.approval2Status || '';
                document.getElementById('admin-approval2-comment').value = draft.approval2Comment || '';
            } else {
                adminPanel.classList.add('hidden');
            }

            modal.classList.remove('hidden');
        }

        // ── 관리자 결재 상태 직접 저장 ────────────────────────────────
        window.adminSaveApprovalStatus = async (docId) => {
            if (!currentUser.isAdmin) return;
            const draft = draftCache[docId];
            if (!draft) return;

            const appr1Email   = document.getElementById('admin-approver1-email').value;
            const appr1Status  = document.getElementById('admin-approval1-status').value;
            const appr1Comment = document.getElementById('admin-approval1-comment').value.trim();
            const appr2Email   = document.getElementById('admin-approver2-email').value;
            const appr2Status  = document.getElementById('admin-approval2-status').value;
            const appr2Comment = document.getElementById('admin-approval2-comment').value.trim();

            const updateData = {
                approver1Email:   appr1Email,
                approver1Name:    getUserNameByEmail(appr1Email),
                approval1Status:  appr1Status  || null,
                approval1Comment: appr1Comment || null,
                approver2Email:   appr2Email,
                approver2Name:    getUserNameByEmail(appr2Email),
                approval2Status:  appr2Status  || null,
                approval2Comment: appr2Comment || null,
                // 2차 결재 완료로 변경 시 finalApprovalDate 자동 설정
                finalApprovalDate: (appr2Status === '결재')
                    ? (draft.finalApprovalDate || new Date().toISOString())
                    : null,
                // 감사 추적 로그
                adminEditLog: {
                    editor: currentUser.email,
                    editorName: currentUser.name,
                    timestamp: new Date().toISOString(),
                }
            };

            try {
                showLoading('결재 상태 저장 중...');
                await updateDoc(doc(db, 'drafts', docId), updateData);
                await updateIndexDoc(docId, updateData); // ★ await로 반영 보장

                // Optimistic Update
                const fullSyncedData = { ...draft, ...updateData };
                draftCache[docId] = fullSyncedData;
                const aidx = allFetchedData.findIndex(d => d.docId === docId);
                if (aidx !== -1) allFetchedData[aidx] = fullSyncedData;
                localStorage.removeItem(CACHE_KEYS.DRAFTS);

                // ★ 백그라운드 갱신 시 stale 데이터 덮어쓰기 방지
                recentlyUpdatedDocIds.add(docId);
                setTimeout(() => recentlyUpdatedDocIds.delete(docId), 10000);

                closeModal('modal-detail');
                showToast('결재 상태가 저장되었습니다.', 'success');
                renderWithFilter(getActiveTabTarget());
                setTimeout(() => loadDraftsFromDB(getActiveTabTarget(), false).catch(() => {}), 2000);
            } catch(e) {
                showToast('저장 오류: ' + e.message, 'error');
            } finally {
                hideLoading();
            }
        };

        // 대외비 첨부파일 열기 — 파일별 로그 기록
        window.openConfidentialFile = async (docId, fileName, url) => {
            const draft = draftCache[docId];
            try {
                // 파일 열람 로그 (파일명 포함)
                await setDoc(doc(collection(db, 'accessLogs')), {
                    docId:       docId,
                    docTitle:    draft ? draft.title : docId,
                    category:    '대외비',
                    viewer:      currentUser.email,
                    viewerName:  currentUser.name,
                    type:        'file_open',
                    fileName:    fileName,
                    authMethod:  'google_reauth',
                    timestamp:   new Date().toISOString()
                });
            } catch(e) { console.warn('[fileLog] 기록 실패:', e); }
            window.open(url, '_blank');
        };

        window.editDraft = (docId) => {
            const draft = draftCache[docId];
            if (!draft) return;
            closeModal('modal-detail');
            openNewDraftModal(); 
            
            document.getElementById('draft-modal-title').textContent = '기안 수정';
            document.getElementById('input-doc-id').value = draft.docId;
            document.getElementById('input-category').value = draft.category;
            document.getElementById('input-corporation').value = draft.corporation;
            document.getElementById('input-title').value = draft.title;
            document.getElementById('input-content').innerHTML = draft.content;
            document.getElementById('input-ref').value = draft.ref || '';
            document.getElementById('input-approver1').value = draft.approver1Email;
            document.getElementById('input-approver2').value = draft.approver2Email;
            
            currentAttachments = draft.attachments ? [...draft.attachments] : [];
            renderCurrentAttachments();
            
            const linkWrapper = document.getElementById('ref-links-wrapper');
            linkWrapper.innerHTML = '';
            
            if (draft.refLinks && draft.refLinks.length > 0) {
                draft.refLinks.forEach(link => {
                     const titleVal = link.title || '';
                     const urlVal = link.url || link;
                     linkWrapper.insertAdjacentHTML('beforeend', `
                        <div class="flex gap-2 mb-2 ref-link-row items-center">
                            <input type="text" value="${titleVal}" placeholder="링크 제목" class="w-1/3 rounded-lg border-gray-300 border p-2.5 text-sm">
                            <input type="text" value="${urlVal}" placeholder="URL" class="flex-1 rounded-lg border-gray-300 border p-2.5 text-sm">
                            <button type="button" onclick="this.parentElement.remove()" class="text-red-500 hover:bg-red-50 p-2 rounded transition"><i class="bi bi-trash"></i></button>
                        </div>`);
                });
            } else {
                 addRefLinkInput();
            }
            showToast('내용을 수정 후 저장하세요.');
        };
        
        function renderCurrentAttachments() {
            const container = document.getElementById('existing-files-area');
            if (!container) return;
            container.innerHTML = '';
            currentAttachments.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'flex items-center justify-between bg-blue-50 border border-blue-100 rounded px-3 py-2 mb-2 text-sm text-blue-800';
                item.innerHTML = `
                    <div class="flex items-center gap-2 overflow-hidden">
                        <i class="bi bi-paperclip shrink-0"></i>
                        <a href="${file.url}" target="_blank" class="truncate hover:underline">${file.name}</a>
                    </div>
                    <button type="button" onclick="removeAttachment(${index})" class="text-red-500 hover:text-red-700 ml-2 p-1">
                        <i class="bi bi-x-lg"></i>
                    </button>
                `;
                container.appendChild(item);
            });
        }

        window.removeAttachment = (index) => {
            if (confirm('이 첨부파일을 삭제하시겠습니까? (저장 시 반영됩니다)')) {
                currentAttachments.splice(index, 1);
                renderCurrentAttachments();
            }
        };

        function renderApprovalStatus(elId, name, status, comment) {
            const container = document.getElementById(elId);
            let badge = '<span class="px-2 py-0.5 bg-gray-200 text-gray-600 rounded text-xs">대기</span>';
            if (status === '결재') badge = '<span class="px-2 py-0.5 bg-green-100 text-green-700 rounded text-xs">승인</span>';
            if (status === '반려') badge = '<span class="px-2 py-0.5 bg-red-100 text-red-700 rounded text-xs">반려</span>';
            container.innerHTML = `<div class="font-bold text-sm">${name}</div><div class="mb-1">${badge}</div>${comment ? `<div class="text-xs text-gray-500 bg-gray-50 p-2 rounded">"${comment}"</div>` : ''}`;
        }

        function closeModal(modalId) { document.getElementById(modalId).classList.add('hidden'); }
        function showLoading(msg) { document.querySelector('#loading-overlay p').textContent = msg; document.getElementById('loading-overlay').classList.remove('hidden'); }
        function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-5 right-5 px-6 py-3 rounded-lg shadow-lg text-white text-sm ${isError ? 'bg-red-500' : 'bg-gray-800'} animate-bounce z-50`;
            toast.textContent = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000);
        }
        function getTitleByListType(type) {
            const map = { 
                'myDrafts': '내가 올린 기안', 
                'toApprove': '결재할 문서', 
                'toApproveConfidential': '결재(대외비)', 
                'allDrafts': '전체 기안', 
                'allConfidentialDrafts': '전체(대외비)',
                'acc-paju': '지급 처리 - 동영(파주)',
                'acc-yongin': '지급 처리 - 동영(용인)',
                'acc-seoul': '지급 처리 - 동영(서울)',
                'acc-tour': '지급 처리 - 동영투어'
            };
            return map[type] || '목록';
        }
        
        function updateApproverList() { 
            const userOptions = userList.map(u => `<option value="${u.email}">${u.name} (${u.team})</option>`).join('');
            const list1 = document.getElementById('approvers-datalist');
            if (list1) list1.innerHTML = `<option value="전결">1차 전결 (바로 2차 결재로 이동)</option>` + userOptions; 
            const list2 = document.getElementById('approvers-datalist-2');
            if (list2) list2.innerHTML = userOptions;
        }

        function getUserNameByEmail(email) { 
            if(email === '전결') return '전결';
            const u = userList.find(user => user.email === email); 
            return u ? u.name : email.split('@')[0]; 
        }

        window.addRefLinkInput = () => { 
            document.getElementById('ref-links-wrapper').insertAdjacentHTML('beforeend', `
            <div class="flex gap-2 mb-2 ref-link-row items-center">
                <input type="text" placeholder="링크 제목" class="w-1/3 rounded-lg border-gray-300 border p-2.5 text-sm focus:outline-none focus:border-blue-500">
                <input type="text" placeholder="URL" class="flex-1 rounded-lg border-gray-300 border p-2.5 text-sm focus:outline-none focus:border-blue-500">
                <button type="button" onclick="this.parentElement.remove()" class="text-red-500 hover:bg-red-50 p-2 rounded transition"><i class="bi bi-trash"></i></button>
            </div>`); 
        }
        
        function getRefLinksFromDOM() { 
            const links = []; 
            document.querySelectorAll('.ref-link-row').forEach(row => { 
                const inputs = row.querySelectorAll('input');
                const title = inputs[0].value.trim();
                const url = inputs[1].value.trim();
                if(url) { links.push({ title: title || url, url: url }); } 
            }); 
            return links; 
        }

    </script>
</head>
<body>
<!-- ★ 긴급 점검 — 해제 시 이 블록만 삭제 -->


    <div id="loading-overlay" class="fixed inset-0 bg-white/90 z-50 flex flex-col justify-center items-center backdrop-blur-sm hidden">
        <div class="animate-spin rounded-full h-10 w-10 border-b-4 border-blue-600 mb-4"></div>
        <p class="text-gray-600 font-medium text-sm">DY 의사결정시스템 접속 중...</p>
    </div>

    <div id="login-view" class="h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-blue-50 hidden">
        <div class="bg-white p-10 rounded-2xl shadow-xl text-center max-w-sm w-full border border-gray-100 mx-4">
            <div class="mb-10">
                <div class="flex justify-center mb-6">
                    <img src="https://docs.google.com/drawings/d/e/2PACX-1vQC6X9H3jTLB8IurxAun_V99Sp9rDO0pwSgCb3HoIclg5LSgs3Xv_AKYbRqMt5crNIdvbhotXpN8I9M/pub?w=302&h=113" 
                         alt="DY 로고" class="h-14 w-auto object-contain" loading="lazy">
                </div>
                <h1 class="text-2xl font-bold text-slate-800 mb-1 tracking-tight">DY 의사결정시스템</h1>
                <p class="text-slate-400 text-xs font-medium uppercase tracking-wider">Decision Making System</p>
            </div>
            <button id="btn-login" class="w-full bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 font-medium py-3.5 px-4 rounded-xl shadow-sm transition flex items-center justify-center gap-3 text-sm group">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5 group-hover:scale-110 transition-transform">
                Google 계정으로 시작하기
            </button>
        </div>
    </div>

    <div id="app-view" class="hidden flex h-screen overflow-hidden relative">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden" onclick="toggleSidebar()"></div>

        <aside id="main-sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-white border-r border-gray-200 flex flex-col shadow-lg transform -translate-x-full transition-transform duration-300 md:translate-x-0 md:static md:flex md:shadow-none">
            
            <div class="p-6 border-b border-gray-100 flex flex-col justify-center h-24">
                <img src="https://docs.google.com/drawings/d/e/2PACX-1vQC6X9H3jTLB8IurxAun_V99Sp9rDO0pwSgCb3HoIclg5LSgs3Xv_AKYbRqMt5crNIdvbhotXpN8I9M/pub?w=302&h=113" 
                         alt="DY" class="h-8 w-auto object-contain self-start mb-2" loading="lazy">
